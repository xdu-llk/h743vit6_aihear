<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>AI Hear</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#FFF5F5;color:#4A3B3C;
  display:flex;flex-direction:column;height:100%;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* ── 设备绑定 ── */
.bind-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#FFF5F5;z-index:10000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;
  padding-top:env(safe-area-inset-top)}
.bind-overlay.hidden{display:none}
.bind-card{background:#fff;border-radius:20px;padding:30px;width:100%;max-width:360px;
  box-shadow:0 8px 32px rgba(0,0,0,.08);text-align:center}
.bind-card h2{font-size:22px;color:#F2A0A0;margin-bottom:6px}
.bind-card .sub{font-size:14px;color:#B8A9A5;margin-bottom:24px}
.bind-card label{display:block;text-align:left;font-size:14px;color:#888;margin-bottom:6px;margin-top:16px}
.bind-card input{width:100%;padding:14px;border:2px solid #F5E0E0;border-radius:12px;font-size:16px;outline:none}
.bind-card input:focus{border-color:#F2A0A0}
.bind-card .btn-bind{margin-top:24px;width:100%;padding:16px;
  background:linear-gradient(135deg,#F2A0A0,#E8888A);color:#fff;border:none;border-radius:14px;
  font-size:18px;font-weight:700;cursor:pointer}
.bind-card .hint{font-size:12px;color:#C5B9B7;margin-top:16px;line-height:1.6}
.device-list{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.device-row{display:flex;gap:8px;align-items:center}
.device-choice{flex:1;padding:11px 12px;border:1px solid #F5E0E0;background:#fff;color:#555;
  text-align:left;font-size:14px;cursor:pointer}
.device-choice.selected{border-color:#F2A0A0;background:#FFF5F5;color:#C65F65;font-weight:700}
.device-remove{width:40px;height:40px;border:1px solid #F2CCCC;background:#fff;color:#C44;
  font-size:20px;cursor:pointer}
.monitor-toolbar{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 8px}
.monitor-toolbar h3{font-size:15px;color:#5A4A4B}.monitor-toolbar span{font-size:12px;color:#A99;margin-left:6px}
.monitor-add{width:36px;height:36px;border:1px solid #E8D8D8;background:#fff;color:#B65B61;font-size:22px;cursor:pointer}
.monitor-list{background:#fff;border-top:1px solid #EEDDDD;border-bottom:1px solid #EEDDDD;margin-bottom:16px}
.monitor-row{width:100%;min-height:64px;border:0;border-bottom:1px solid #F1E6E6;background:#fff;padding:9px 12px;
  display:grid;grid-template-columns:10px minmax(0,1fr) auto;gap:10px;align-items:center;text-align:left;cursor:pointer}
.monitor-row:last-child{border-bottom:0}.monitor-row.selected{background:#FFF6F6}.monitor-row.alerting{background:#FFF0F0}
.monitor-state{width:9px;height:9px;border-radius:50%;background:#AAA}.monitor-state.online{background:#2EAD62}.monitor-state.alert{background:#D63838}
.monitor-main{min-width:0}.monitor-name{font-size:14px;font-weight:700;color:#4A3B3C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.monitor-meta{font-size:11px;color:#A69697;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.monitor-count{text-align:right;font-size:11px;color:#9A8586}.monitor-count b{display:block;font-size:19px;color:#C65F65}
.detail-title{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px;color:#6A5859;font-size:13px;font-weight:700}

/* ── 内容区（可滚动） ── */
.content-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.tab-pane{display:none;padding:14px;min-height:100%;animation:fadeIn .3s}
.tab-pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── 底部 Tab 导航 ── */
.tab-bar{display:flex;background:#fff;border-top:2px solid #F5E0E0;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom)}
.tab-bar button{flex:1;padding:11px 0 9px;border:none;background:none;font-size:12px;color:#B8A9A5;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.2s}
.tab-bar button .tb-icon{font-size:20px;line-height:1}
.tab-bar button.active{color:#F2A0A0;font-weight:700}

/* ── 告警 状态栏 ── */
.status-bar{background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #F5E8E8}
.status-bar .left{display:flex;align-items:center;gap:10px}
.mqtt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mqtt-dot.on{background:#4F8;box-shadow:0 0 8px #4F8}
.mqtt-dot.mid{background:#FD0;box-shadow:0 0 8px #FD0}
.mqtt-dot.off{background:#F44;box-shadow:0 0 8px #F44}
.stxt{font-size:13px;font-weight:600}
.stxt.ok{color:#28a745}
.stxt.err{color:#dc3545}
.dev{font-size:11px;color:#B8A9A5}
.btn-toggle{background:#F2A0A0;color:#fff;border:none;padding:10px 20px;border-radius:20px;
  font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0}

/* ── 告警列表 ── */
.alert-item{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid #F5E8E8;
  border-left:4px solid #E0D0D0}
.alert-item.cry-card{border-left:4px solid #E8534F;background:#FFFBFB}
.alert-item .icon{font-size:30px;flex-shrink:0}
.alert-item .info{flex:1}.alert-item .cls{font-weight:700;font-size:14px}
.alert-item .cls.cry{color:#E8534F}.alert-item .meta{font-size:12px;color:#B8A9A5;margin-top:2px}
.alert-item .del{background:#FDD;border:1px solid #FCC;color:#D33;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600}
.alert-item .del:active{background:#FBB}

/* ── 喂养 ── */
.feed-row{display:flex;gap:10px;margin-bottom:14px}
.feed-row input{flex:1;padding:12px 16px;border:2px solid #F5E0E0;border-radius:12px;font-size:15px;outline:none}
.feed-row input:focus{border-color:#F2A0A0}
.feed-row button{padding:12px 20px;background:#F2A0A0;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
.feed-item{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid #F5E8E8;border-left:4px solid #A8D8CA}
.feed-item .fleft{flex:1}.feed-item .fts{font-size:14px;font-weight:600}
.feed-item .fnt{font-size:12px;color:#B8A9A5}

/* ── 统计 ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:16px;padding:18px;text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid #F5E8E8}
.stat-card .num{font-size:36px;font-weight:800;color:#F2A0A0}
.stat-card .label{font-size:13px;color:#B8A9A5;margin-top:4px}
.bar-chart{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.bar-chart h3{font-size:15px;margin-bottom:14px;color:#666}
.bar-row{display:flex;align-items:center;margin-bottom:10px}
.bar-row .day{width:36px;font-size:12px;color:#B8A9A5;text-align:right;margin-right:8px;flex-shrink:0}
.bar-row .bar{flex:1;height:24px;background:#F5E0E0;border-radius:6px;position:relative;overflow:hidden}
.bar-row .bar .fill{height:100%;background:linear-gradient(90deg,#F2A0A0,#E8888A);border-radius:6px;transition:width .5s}
.bar-row .bar span{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#fff}

/* ── AI ── */
.ai-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ai-card h3{font-size:16px;margin-bottom:6px;color:#666}
.ai-result{font-size:14px;line-height:1.8;color:#555;white-space:pre-wrap;margin-top:12px;padding:14px;background:#FFFBF5;border-radius:10px;border:1px solid #F5E0E0;min-height:80px}
.btn-ai{margin-top:12px;width:100%;padding:14px;background:linear-gradient(135deg,#8E7AB5,#B5A0D8);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer}
.api-cfg{margin-top:14px;padding:14px;background:#FFFBEB;border-radius:10px;border:1px solid #F5E0E0}
.api-cfg label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.api-cfg input{width:100%;padding:10px;border:1px solid #E8DDD8;border-radius:8px;font-size:13px;outline:none;margin-bottom:8px}
.api-cfg button{padding:8px 18px;background:#F2A0A0;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}

/* ── 告警弹窗 ── */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(220,50,50,.94);z-index:9999;
  display:none;flex-direction:column;align-items:center;justify-content:center}
.overlay.show{display:flex}
.overlay .icon{font-size:80px;animation:bounce .6s infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.15)}}
.overlay .msg{color:#fff;font-size:28px;font-weight:800;margin:20px 0;text-align:center}
.overlay .sub{color:rgba(255,255,255,.8);font-size:15px;margin-bottom:30px}
.overlay .dismiss{background:#fff;color:#D32;padding:16px 48px;border:none;border-radius:24px;font-size:18px;font-weight:700;cursor:pointer}

.empty{text-align:center;color:#C5B9B7;padding:40px 0;font-size:15px}
.err-msg{background:#FFF3CD;color:#856404;padding:10px 14px;border-radius:10px;margin-bottom:10px;font-size:13px;display:none}

/* ── 2026 visual refresh: compact monitoring workspace ── */
:root{
  --bg:#f4f6f5;--surface:#ffffff;--ink:#202927;--muted:#6f7c79;--line:#dfe5e2;
  --teal:#147d72;--teal-soft:#e5f3f0;--red:#d94d4d;--red-soft:#fceaea;
  --blue:#3267c8;--blue-soft:#eaf0fb;--amber:#b96b12;--amber-soft:#fff2dc;
  --pink:#d77983;--shadow:0 2px 8px rgba(28,45,41,.07)
}
body{background:var(--bg);color:var(--ink);letter-spacing:0}
.content-area{background:var(--bg)}
.tab-pane{padding:14px 14px 20px}

.bind-overlay{background:var(--bg)}
.bind-card{border-radius:8px;padding:24px;border:1px solid var(--line);box-shadow:var(--shadow)}
.bind-card h2{color:var(--ink);font-size:20px}
.bind-card .sub,.bind-card .hint{color:var(--muted)}
.bind-card p{overflow-wrap:anywhere}
.bind-card input{border:1px solid var(--line);border-radius:6px;background:#fbfcfc}
.bind-card input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
.bind-card .btn-bind{border-radius:6px;background:var(--teal);font-size:15px;padding:13px}
.device-choice{border-color:var(--line);border-radius:6px}
.device-choice.selected{border-color:var(--teal);background:var(--teal-soft);color:var(--teal)}
.device-remove{border-radius:6px;border-color:#efcaca;background:var(--red-soft);color:var(--red)}

.status-bar{border-radius:8px;padding:13px 14px;margin-bottom:10px;border:1px solid var(--line);box-shadow:none}
.status-bar .left{min-width:0}.status-bar .left>div{min-width:0}
.mqtt-dot{width:9px;height:9px}.mqtt-dot.on{background:#22a06b;box-shadow:0 0 0 4px #e4f5ed}
.mqtt-dot.mid{background:#d79821;box-shadow:0 0 0 4px #fff4d8}
.mqtt-dot.off{background:#c84c4c;box-shadow:0 0 0 4px #fce8e8}
.stxt{font-size:13px;color:var(--ink)}.stxt.ok{color:#187a54}.stxt.err{color:#b54141}
.dev{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px}
.btn-toggle{border-radius:6px;background:var(--blue);padding:9px 13px;font-size:12px;min-width:88px}

.control-panel{background:var(--surface);border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden}
.environment-row{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;border-bottom:1px solid var(--line)}
.environment-row .label{font-size:11px;color:var(--muted)}
.environment-row strong{font-size:16px;color:var(--amber);font-weight:750}
.control-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:12px}
.control-btn{height:42px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);font-size:12px;font-weight:650;cursor:pointer;min-width:0}
.control-btn.arm{background:var(--teal-soft);border-color:#b8ddd5;color:#116b62}
.control-btn.music{background:var(--blue-soft);border-color:#c7d5f1;color:#2859ad}
.control-btn.monitor{background:#f1f3f2;color:#4d5a57}
.control-btn:disabled{opacity:.62;cursor:default}
.bulk-row{display:grid;grid-template-columns:minmax(76px,1fr) 1fr 1fr;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid var(--line);background:#fafbfb}
.bulk-row span{font-size:11px;color:var(--muted)}
.bulk-btn{height:34px;border-radius:6px;font-size:11px;font-weight:650;background:#fff;cursor:pointer}
.bulk-btn.arm{border:1px solid #b8ddd5;color:#116b62}.bulk-btn.disarm{border:1px solid #efc5c5;color:#b54141}

.monitor-toolbar{margin:2px 0 8px}.monitor-toolbar h3{font-size:14px;color:var(--ink)}
.monitor-toolbar span{color:var(--muted)}
.monitor-add{border-radius:6px;border-color:var(--line);color:var(--teal);font-size:20px}
.monitor-list{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:14px}
.monitor-row{min-height:62px;border-bottom-color:var(--line);padding:10px 12px}
.monitor-row.selected{background:#f0f7f5}.monitor-row.alerting{background:var(--red-soft)}
.monitor-name,.monitor-meta{display:block}
.monitor-name{color:var(--ink)}.monitor-meta,.monitor-count{color:var(--muted)}
.monitor-count b{color:var(--red)}
.detail-title{color:var(--ink);font-size:13px;margin-top:2px}

.alert-item,.feed-item{border-radius:8px;border-color:var(--line);box-shadow:none;padding:13px}
.alert-item.cry-card{background:#fff;border-left-color:var(--red)}
.alert-item .del{border-radius:6px;background:var(--red-soft);border-color:#efcaca;color:#b54141}
.feed-row input{border:1px solid var(--line);border-radius:6px;background:#fff}
.feed-row input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
.feed-row button{border-radius:6px;background:var(--teal);font-size:13px}

.action-row{display:flex;justify-content:flex-end;gap:8px;padding:4px 0 18px}
.action-btn{height:34px;padding:0 13px;border-radius:6px;background:#fff;font-size:11px;cursor:pointer}
.action-btn.manage{border:1px solid var(--line);color:#4f5d59}
.action-btn.clear{border:1px solid #efcaca;color:#b54141;background:var(--red-soft)}

.stat-grid{gap:8px;margin-bottom:12px}
.stat-card{border-radius:8px;padding:14px 10px;border-color:var(--line);box-shadow:none;text-align:left;min-height:92px}
.stat-card .num{font-size:28px;color:var(--ink);line-height:1.1}
.stat-card .label{font-size:11px;color:var(--muted);margin-top:8px}
.stat-card:nth-child(1) .num,.stat-card:nth-child(3) .num{color:var(--red)}
.stat-card:nth-child(2) .num,.stat-card:nth-child(4) .num{color:var(--teal)}
.stat-card:nth-child(5) .num{color:var(--amber)}.stat-card:nth-child(6) .num{color:var(--blue)}
.bar-chart{border-radius:8px;border:1px solid var(--line);box-shadow:none;padding:16px}
.bar-chart h3{color:var(--ink)}
.bar-row .bar{background:#eef1f0}.bar-row .bar .fill{background:var(--red);border-radius:4px}

.ai-card{border-radius:8px;border:1px solid var(--line);box-shadow:none;padding:16px}
.ai-card h3{color:var(--ink)}
.ai-result{border-radius:6px;border-color:var(--line);background:#f8faf9;color:#394440}
.btn-ai{border-radius:6px;background:var(--blue);font-size:14px;padding:12px}
.api-cfg{border-radius:6px;border-color:var(--line);background:#f8faf9}
.api-cfg input,.api-cfg button{border-radius:6px}.api-cfg button{background:var(--teal)}

.tab-bar{border-top:1px solid var(--line);box-shadow:0 -2px 10px rgba(28,45,41,.05)}
.tab-bar button{padding:9px 0 8px;color:#7a8784;gap:2px;position:relative}
.tab-bar button .tb-icon{width:24px;height:20px;border-radius:5px;background:#eef1f0;color:#66736f;font-size:10px;font-weight:800;display:grid;place-items:center}
.tab-bar button.active{color:var(--teal)}
.tab-bar button.active .tb-icon{background:var(--teal-soft);color:var(--teal)}

.overlay{background:rgba(168,42,42,.96)}
.overlay .dismiss{border-radius:6px;color:#a62c2c}
.err-msg{border-radius:6px;background:var(--amber-soft);color:#74450c}
.empty{color:#8a9693}

@media (max-width:360px){
  .tab-pane{padding-left:10px;padding-right:10px}
  .control-grid{gap:6px;padding:10px}.control-btn{font-size:11px}
  .bulk-row{grid-template-columns:68px 1fr 1fr;gap:6px;padding:9px 10px}
  .btn-toggle{min-width:76px;padding-left:9px;padding-right:9px}
}
</style>
</head>
<body>

<!-- ═══════════════ 设备绑定 ═══════════════ -->
<div id="bindPage" class="bind-overlay">
  <div class="bind-card">
    <h2>绑定设备</h2>
    <p class="sub">首次使用，请输入 ESP8266 设备 ID</p>
    <label>设备 ID</label>
    <input type="text" id="bindDeviceId" placeholder="例: aihear_AABBCC" autocomplete="off">
    <label>房间名称</label>
    <input type="text" id="bindDeviceAlias" placeholder="例: 婴儿房 01" maxlength="24" autocomplete="off">
    <p style="font-size:12px;color:#B8A9A5;text-align:left;margin-top:4px">
      设备通电后，串口可看到 +DEVICEID:aihear_XXXXXX
    </p>
    <button class="btn-bind" onclick="doBind()">添加设备</button>
    <div id="boundDeviceList" class="device-list"></div>
    <p class="hint">选择设备后，告警、统计与通知将按设备隔离</p>
  </div>
</div>

<!-- ═══════════════ 告警弹窗 ═══════════════ -->
<div id="overlay" class="overlay" onclick="dismissAlert()">
  <div class="icon">🚼</div>
  <div class="msg" id="overlayMsg">检测到婴儿哭声！</div>
  <div class="sub" id="overlaySub"></div>
  <button class="dismiss" onclick="event.stopPropagation();dismissAlert()">确认</button>
</div>

<!-- ═══════════════ 主内容区 ═══════════════ -->
<div class="content-area">

  <!-- 告警 -->
  <div id="pane-alerts" class="tab-pane active">
    <div class="err-msg" id="errMsg"></div>
    <div class="status-bar">
      <div class="left">
        <span class="mqtt-dot off" id="mqttDot"></span>
        <div>
          <div class="stxt err" id="mqttLabel">MQTT 未连接</div>
          <div class="dev" id="deviceInfo">未绑定设备</div>
        </div>
      </div>
      <button class="btn-toggle" id="btnToggle" onclick="toggleService()">开启监视</button>
    </div>
    <div class="control-panel">
      <div class="environment-row"><span class="label">当前环境</span><strong id="envDisplay">--°C · --% RH</strong></div>
      <div class="control-grid">
        <button id="btnArm" class="control-btn arm" onclick="toggleArm()">布防</button>
        <button id="btnMusic" class="control-btn music" onclick="toggleMusic()">播放音乐</button>
        <button id="btnMonitorAll" class="control-btn monitor" onclick="toggleMonitorAll()">全部监视</button>
      </div>
      <div class="bulk-row">
        <span>全部设备</span>
        <button class="bulk-btn arm" onclick="sendCmdAll('arm')">一键布防</button>
        <button class="bulk-btn disarm" onclick="sendCmdAll('disarm')">一键撤防</button>
      </div>
    </div>
    <div class="monitor-toolbar"><div><h3 style="display:inline">设备总览</h3><span id="monitorCount">0台</span></div><button class="monitor-add" onclick="showBind()" title="管理设备">＋</button></div>
    <div id="deviceMonitorList" class="monitor-list"><div class="empty">尚未绑定设备</div></div>
    <div class="detail-title"><span id="selectedDeviceTitle">设备详情</span><span>最近告警</span></div>
    <div id="alertList"><div class="empty">暂无告警记录</div></div>
    <div class="action-row">
      <button class="action-btn manage" onclick="showBind()">管理设备</button>
      <button class="action-btn clear" onclick="clearAlerts()">清空告警</button>
    </div>
  </div>

  <!-- 喂养 -->
  <div id="pane-feeding" class="tab-pane">
    <div class="detail-title"><span id="feedDeviceTitle">喂养记录</span><span></span></div>
    <div class="feed-row">
      <input type="text" id="feedNote" placeholder="备注（配方奶/母乳/量ml）">
      <button onclick="addFeeding()">记录</button>
    </div>
    <div id="feedList"><div class="empty">暂无喂养记录</div></div>
  </div>

  <!-- 统计 -->
  <div id="pane-stats" class="tab-pane">
    <div class="detail-title"><span id="statsDeviceTitle">数据统计</span><span></span></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="num" id="todayAlerts">0</div><div class="label">今日告警</div></div>
      <div class="stat-card"><div class="num" id="todayFeeds">0</div><div class="label">今日喂养</div></div>
      <div class="stat-card"><div class="num" id="weekAlerts">0</div><div class="label">本周告警</div></div>
      <div class="stat-card"><div class="num" id="weekFeeds">0</div><div class="label">本周喂养</div></div>
      <div class="stat-card"><div class="num" id="avgTemp">--</div><div class="label">平均温度</div></div>
      <div class="stat-card"><div class="num" id="avgHumi">--</div><div class="label">平均湿度</div></div>
    </div>
    <div class="bar-chart">
      <h3>近7天告警趋势</h3>
      <div id="chartBars"></div>
    </div>
  </div>

  <!-- AI -->
  <div id="pane-ai" class="tab-pane">
    <div class="ai-card">
      <h3>DeepSeek AI 分析</h3>
      <div class="detail-title"><span id="aiDeviceTitle">当前设备</span><span></span></div>
      <p style="font-size:13px;color:#B8A9A5;margin-bottom:10px">基于近期告警和喂养数据，分析宝宝作息规律</p>
      <div class="ai-result" id="aiResult">点击下方按钮开始分析</div>
      <button class="btn-ai" id="btnAi" onclick="runAiAnalysis()">开始分析</button>
      <div class="api-cfg">
        <label>DeepSeek API Key（已预置，可自行更换）</label>
        <input type="password" id="apiKey" value="" placeholder="sk-xxxxxxxx">
        <button onclick="saveApiKey()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ 底部导航栏 ═══════════════ -->
<div class="tab-bar">
  <button class="active" onclick="switchTab('alerts')"><span class="tb-icon">警</span>告警</button>
  <button onclick="switchTab('feeding')"><span class="tb-icon">记</span>喂养</button>
  <button onclick="switchTab('stats')"><span class="tb-icon">数</span>统计</button>
  <button onclick="switchTab('ai')"><span class="tb-icon">AI</span>分析</button>
</div>

<script>
var devices=[],deviceSummaries=[],deviceId='',started=false,mqttStatus=0,overlayActive=false;
var beepTimer=null,audioOsc=null,audioGain=null,audioCtx=null;

// ═══════════════ 设备绑定 ═══════════════
function initBind(){
  var old=normalizeDeviceId(localStorage.getItem('device_id')||'');
  if(typeof Android!=='undefined'){
    if(old){try{Android.addBoundDevice(old);}catch(e){}}
    try{devices=JSON.parse(Android.getBoundDevices()||'[]');}catch(e){devices=[];}
  }else{
    try{devices=JSON.parse(localStorage.getItem('bound_devices')||'[]');}catch(e){devices=[];}
    if(old&&devices.indexOf(old)<0)devices.push(old);
  }
  devices=devices.map(normalizeDeviceId).filter(function(v,i,a){return v&&a.indexOf(v)===i;}).sort();
  deviceId=normalizeDeviceId(localStorage.getItem('selected_device')||'');
  if(devices.indexOf(deviceId)<0)deviceId=devices[0]||'';
  if(deviceId)localStorage.setItem('selected_device',deviceId);
  renderDeviceList();updateDeviceInfo();
  if(deviceId)document.getElementById('bindPage').classList.add('hidden');
}
function normalizeDeviceId(raw){
  var id=(raw||'').trim().toLowerCase();
  if(/^[0-9a-f]{6}$/.test(id))id='aihear_'+id;
  return /^aihear_[0-9a-f]{6}$/.test(id)?id:'';
}
function persistFallbackDevices(){localStorage.setItem('bound_devices',JSON.stringify(devices));}
function loadDeviceSummaries(){
  if(typeof Android!=='undefined'){
    try{deviceSummaries=JSON.parse(Android.getDeviceSummaries()||'[]');}catch(e){deviceSummaries=[];}
  }else deviceSummaries=devices.map(function(id){return{deviceId:id,alias:id,lastSeen:0,todayAlerts:0};});
  return deviceSummaries;
}
function deviceAlias(id){
  for(var i=0;i<deviceSummaries.length;i++)if(deviceSummaries[i].deviceId===id)return deviceSummaries[i].alias||id;
  return id;
}
function renderDeviceList(){
  loadDeviceSummaries();
  var box=document.getElementById('boundDeviceList'),h='';
  devices.forEach(function(id){
    h+='<div class="device-row"><button class="device-choice'+(id===deviceId?' selected':'')+'" onclick="selectDevice(\''+id+'\')">'+
      esc(deviceAlias(id))+' · '+esc(id)+(id===deviceId?' · 当前':'')+'</button><button class="device-remove" aria-label="移除设备" onclick="removeDevice(\''+id+'\')">×</button></div>';
  });
  box.innerHTML=h||'<div class="empty" style="padding:10px 0">尚未绑定设备</div>';
}
function updateDeviceInfo(){
  var dn=deviceId?deviceAlias(deviceId)+' · '+deviceId:'未绑定设备';
  document.getElementById('deviceInfo').textContent=dn;
  document.getElementById('selectedDeviceTitle').textContent=deviceId?deviceAlias(deviceId):'设备详情';
  document.getElementById('feedDeviceTitle').textContent=deviceId?deviceAlias(deviceId):'喂养记录';
  document.getElementById('statsDeviceTitle').textContent=deviceId?deviceAlias(deviceId):'数据统计';
  document.getElementById('aiDeviceTitle').textContent=deviceId?deviceAlias(deviceId):'当前设备';
}
function showBind(){document.getElementById('bindDeviceId').value='';document.getElementById('bindDeviceAlias').value='';renderDeviceList();document.getElementById('bindPage').classList.remove('hidden');}
function selectDevice(id){
  id=normalizeDeviceId(id);if(!id||devices.indexOf(id)<0)return;
  deviceId=id;localStorage.setItem('selected_device',id);localStorage.setItem('device_id',id);
  /* exit "monitor all" mode when manually selecting a device */
  if(monitorAll){monitorAll=false;updateMonitorAllBtn();}
  renderDeviceList();updateDeviceInfo();document.getElementById('bindPage').classList.add('hidden');
  loadAlerts();loadStats();renderMonitorList();
  document.getElementById('aiResult').textContent='点击下方按钮开始分析';
  /* immediately refresh per-device display */
  updateArmBtn();updateMusicBtn();pollEnv();
}
function doBind(){
  var id=normalizeDeviceId(document.getElementById('bindDeviceId').value);
  var alias=document.getElementById('bindDeviceAlias').value.trim();
  if(!id){alert('设备 ID 格式应为 aihear_ 加 6 位十六进制字符');return;}
  if(typeof Android!=='undefined'&&!Android.addBoundDevice(id)){alert('绑定失败');return;}
  if(typeof Android!=='undefined'&&alias)Android.setDeviceAlias(id,alias);
  if(devices.indexOf(id)<0)devices.push(id);devices.sort();persistFallbackDevices();
  document.getElementById('bindDeviceId').value='';document.getElementById('bindDeviceAlias').value='';selectDevice(id);
}
function removeDevice(id){
  if(!confirm('移除设备 '+id+'？历史记录不会删除。'))return;
  if(typeof Android!=='undefined'){
    if(!Android.removeBoundDevice(id)){showError('设备移除失败');return;}
    try{devices=JSON.parse(Android.getBoundDevices()||'[]');}catch(e){showError('设备列表刷新失败');return;}
  }else devices=devices.filter(function(v){return v!==id;});
  devices=devices.map(normalizeDeviceId).filter(Boolean).sort();persistFallbackDevices();
  if(deviceId===id){
    deviceId=devices[0]||'';
    if(deviceId){localStorage.setItem('selected_device',deviceId);localStorage.setItem('device_id',deviceId);}
    else{localStorage.removeItem('selected_device');localStorage.removeItem('device_id');}
  }
  renderDeviceList();updateDeviceInfo();renderMonitorList();
  if(!deviceId)document.getElementById('bindPage').classList.remove('hidden');
}

// ═══════════════ 服务控制 ═══════════════
function toggleService(){started?stopService():startService();}
function startSvc(){startService();}
function startService(){
  if(!devices.length||!deviceId){showBind();return;}
  hideError();
  if(typeof Android!=='undefined'){
    try{Android.startService();}catch(e){showError('启动失败: '+e);return;}
  }
  started=true;localStorage.setItem('started','1');updateUI();
}
function stopService(){
  if(typeof Android!=='undefined'){try{Android.stopAlarm();Android.stopService();}catch(e){}}
  started=false;localStorage.removeItem('started');updateUI();
}
function showError(m){var e=document.getElementById('errMsg');e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none'},4000);}
function hideError(){document.getElementById('errMsg').style.display='none';}

// ═══════════════ 告警弹窗 ═══════════════
function onNewAlert(cls,score){
  if(overlayActive)return;
  var pct=Math.round((score||0)*100);
  document.getElementById('overlayMsg').textContent=/cry|help/i.test(cls)?'🚼 检测到婴儿哭声！':'⚠ 检测到异常声音';
  document.getElementById('overlaySub').textContent='类别: '+cls+'  置信度: '+pct+'%';
  document.getElementById('overlay').classList.add('show');overlayActive=true;
  startBeep();if(navigator.vibrate)navigator.vibrate([500,200,500,200,500,200,1000]);
  loadAlerts();
}
function dismissAlert(){
  document.getElementById('overlay').classList.remove('show');overlayActive=false;stopBeep();
  if(typeof Android!=='undefined')Android.stopAlarm();if(navigator.vibrate)navigator.vibrate(0);
}
function startBeep(){
  stopBeep();
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioOsc=audioCtx.createOscillator();audioGain=audioCtx.createGain();
    audioOsc.type='square';audioOsc.frequency.value=880;audioGain.gain.value=0;
    audioOsc.connect(audioGain);audioGain.connect(audioCtx.destination);audioOsc.start();
    var on=true;beepTimer=setInterval(function(){if(audioGain)audioGain.gain.value=on?0.35:0;on=!on;},300);}catch(e){}
}
function stopBeep(){
  if(beepTimer){clearInterval(beepTimer);beepTimer=null;}
  try{if(audioOsc){audioOsc.stop();audioOsc.disconnect();}if(audioGain)audioGain.disconnect();if(audioCtx)audioCtx.close();}catch(e){}
  audioOsc=null;audioGain=null;audioCtx=null;
}

// ═══════════════ 告警 CRUD ═══════════════
function loadAlerts(){
  var list=document.getElementById('alertList');
  if(typeof Android==='undefined'){list.innerHTML='<div class="empty">加载中...</div>';return;}
  var data=JSON.parse(monitorAll&&!deviceId?Android.getAlerts():
                      (deviceId?Android.getAlertsForDevice(deviceId):Android.getAlerts())||'[]');
  if(!data.length){list.innerHTML='<div class="empty">🎉 暂无告警记录</div>';return;}
  var h='';
  for(var i=0;i<data.length;i++){
    var a=data[i],d=new Date(a.time),cry=/cry|help/i.test(a.cls||'');
    h+='<div class="alert-item'+(cry?' cry-card':'')+'"><span class="icon">'+(cry?'🚼':'🔔')+'</span>'+
      '<div class="info"><div class="cls'+(cry?' cry':'')+'">'+esc(a.cls)+'</div>'+
      '<div class="meta">'+d.toLocaleString('zh-CN')+' · '+esc(a.deviceId||deviceId)+' · '+Math.round((a.score||0)*100)+'%</div></div>'+
      '<button class="del" onclick="delAlert('+a.id+')">删除</button></div>';
  }
  list.innerHTML=h;
}
function delAlert(id){if(typeof Android!=='undefined')Android.deleteAlert(id);loadAlerts();}
function clearAlerts(){var label=monitorAll?'全部设备':(deviceId||'所有');if(!confirm('确定清空 '+label+' 的告警？'))return;if(typeof Android!=='undefined'){if(monitorAll)Android.clearAlerts();else Android.clearAlertsForDevice(deviceId);}loadAlerts();}

function formatAgo(ts){
  if(!ts)return'未上报';var sec=Math.max(0,Math.floor((Date.now()-ts)/1000));
  if(sec<60)return sec+'秒前';if(sec<3600)return Math.floor(sec/60)+'分钟前';return Math.floor(sec/3600)+'小时前';
}
function renderMonitorList(){
  var list=document.getElementById('deviceMonitorList'),data=loadDeviceSummaries();
  data.sort(function(a,b){
    var aa=a.lastAlert&&Date.now()-a.lastAlert.time<600000?1:0,ba=b.lastAlert&&Date.now()-b.lastAlert.time<600000?1:0;
    if(aa!==ba)return ba-aa;return(b.lastSeen||0)-(a.lastSeen||0);
  });
  document.getElementById('monitorCount').textContent=data.length+'台';
  if(!data.length){list.innerHTML='<div class="empty" style="padding:18px 0">尚未绑定设备</div>';return;}
  var h='';data.forEach(function(d){
    var online=d.lastSeen&&Date.now()-d.lastSeen<90000,recent=d.lastAlert&&Date.now()-d.lastAlert.time<600000;
    var state=recent?'alert':online?'online':'',status=recent?'告警 '+esc(d.lastAlert.cls||'异常'):online?'在线 · '+formatAgo(d.lastSeen):formatAgo(d.lastSeen);
    h+='<button class="monitor-row'+(d.deviceId===deviceId?' selected':'')+(recent?' alerting':'')+'" onclick="selectDevice(\''+d.deviceId+'\')">'+
      '<span class="monitor-state '+state+'"></span><span class="monitor-main"><span class="monitor-name">'+esc(d.alias||d.deviceId)+'</span><span class="monitor-meta">'+esc(d.deviceId)+' · '+status+'</span></span>'+
      '<span class="monitor-count"><b>'+Number(d.todayAlerts||0)+'</b>今日</span></button>';
  });list.innerHTML=h;
}

// ═══════════════ 喂养 ═══════════════
function addFeeding(){
  var n=document.getElementById('feedNote').value.trim();
  if(typeof Android!=='undefined')Android.addFeeding(deviceId,n);
  document.getElementById('feedNote').value='';loadFeedings();
}
function loadFeedings(){
  var list=document.getElementById('feedList');
  if(typeof Android==='undefined'){list.innerHTML='<div class="empty">加载中...</div>';return;}
  var data=JSON.parse(deviceId?Android.getFeedingsForDevice(deviceId):Android.getFeedings()||'[]');
  if(!data.length){list.innerHTML='<div class="empty">暂无喂养记录</div>';return;}
  var h='';
  for(var i=0;i<data.length;i++){
    var f=data[i],d=new Date(f.time);
    h+='<div class="feed-item"><div class="fleft"><div class="fts">喂养记录</div>'+
      '<div class="fnt">'+d.toLocaleString('zh-CN')+' · '+esc(f.note||'无备注')+'</div></div>'+
      '<button class="del" onclick="delFeeding('+f.id+')">删除</button></div>';
  }
  list.innerHTML=h;
}
function delFeeding(id){if(typeof Android!=='undefined')Android.deleteFeeding(id);loadFeedings();}

// ═══════════════ 统计 ═══════════════
function loadStats(){
  if(typeof Android==='undefined')return;
  document.getElementById('todayAlerts').textContent=Android.getTodayAlertsForDevice(deviceId);
  document.getElementById('todayFeeds').textContent=deviceId?Android.getTodayFeedingsForDevice(deviceId):Android.getTodayFeedings();
  var alerts=JSON.parse(Android.getAlertsForDevice(deviceId)||'[]');
  var feeds=JSON.parse(deviceId?Android.getFeedingsForDevice(deviceId):Android.getFeedings()||'[]');
  var wa=0,wf=0,weekAgo=Date.now()-7*86400000,days=[],dayMap={};
  for(var i=0;i<7;i++){var k=new Date(Date.now()-(6-i)*86400000).toLocaleDateString('zh-CN');dayMap[k]=0;days.push(k);}
  for(var i=0;i<alerts.length;i++){if(alerts[i].time>weekAgo)wa++;var dk=new Date(alerts[i].time).toLocaleDateString('zh-CN');if(dayMap[dk]!==undefined)dayMap[dk]++;}
  for(var i=0;i<feeds.length;i++){if(feeds[i].time>weekAgo)wf++;}
  document.getElementById('weekAlerts').textContent=wa;document.getElementById('weekFeeds').textContent=wf;
  var maxV=Math.max(1,Math.max.apply(null,Object.values(dayMap))),bars='';
  days.forEach(function(k){var v=dayMap[k],w=Math.round(v/maxV*100);
    bars+='<div class="bar-row"><span class="day">'+k.slice(5)+'</span><div class="bar"><div class="fill" style="width:'+w+'%"></div>'+(v>0?'<span>'+v+'</span>':'')+'</div></div>';});
  document.getElementById('chartBars').innerHTML=bars;
  var avg=getEnvAvg();
  document.getElementById('avgTemp').textContent=avg?avg.temp.toFixed(1)+'℃':'--';
  document.getElementById('avgHumi').textContent=avg?Math.round(avg.humi)+'%':'--';
}

// ═══════════════ MQTT 状态 ═══════════════
function pollMqtt(){
  if(typeof Android==='undefined')return;
  var s=Android.getConnStatus();mqttStatus=s;
  var dot=document.getElementById('mqttDot'),label=document.getElementById('mqttLabel');
  dot.className='mqtt-dot '+(s===2?'on':s===1?'mid':'off');
  var mc=Android.getMsgCount();
  if(s===2){label.textContent='🟢 MQTT 已连接 · 监视'+devices.length+'台 · 收到'+mc+'条';label.className='stxt ok';}
  else if(s===1){label.textContent='🟡 MQTT 连接中...';label.className='stxt err';}
  else{label.textContent='🔴 MQTT 未连接';label.className='stxt err';}
  if(deviceId){
    var seen=Android.getDeviceLastSeen(deviceId),suffix=seen&&Date.now()-seen<90000?' · 在线':' · 未上报';
    document.getElementById('deviceInfo').textContent=deviceAlias(deviceId)+' · '+deviceId+suffix;
  }
  renderMonitorList();
}

// ═══════════════ AI ═══════════════
function saveApiKey(){var k=document.getElementById('apiKey').value.trim();if(k)localStorage.setItem('ds_api_key',k);alert('已保存');}
function runAiAnalysis(){
  var apiKey=localStorage.getItem('ds_api_key')||document.getElementById('apiKey').value.trim();
  if(!apiKey){alert('请先填入 DeepSeek API Key');return;}
  var btn=document.getElementById('btnAi');btn.textContent='分析中...';btn.disabled=true;
  var alerts=JSON.parse((typeof Android!=='undefined'?Android.getAlertsForDevice(deviceId):null)||'[]');
  var feeds=JSON.parse((typeof Android!=='undefined'?(deviceId?Android.getFeedingsForDevice(deviceId):Android.getFeedings()):null)||'[]');
  var ds=new Date();ds.setHours(0,0,0,0);ds=ds.getTime();var ta=0,tf=0,at=[];
  for(var i=0;i<alerts.length;i++){if(alerts[i].time>=ds)ta++;at.push(new Date(alerts[i].time).toLocaleTimeString('zh-CN'));}
  for(var i=0;i<feeds.length;i++){if(feeds[i].time>=ds)tf++;}
  var devName=deviceId?deviceAlias(deviceId):'全部设备';
  var avg=getEnvAvg(),envStr='';
  if(avg)envStr='\n环境：\n- 平均温度: '+avg.temp.toFixed(1)+'℃\n- 平均湿度: '+Math.round(avg.humi)+'%';
  var prompt='你是婴儿护理专家，同时懂环境健康。设备: '+devName+' ('+deviceId+')\n数据：\n- 今日哭声: '+ta+' 次\n'+(at.length?'- 最近: '+at.slice(0,5).join(', ')+'\n':'')+'- 今日喂养: '+tf+' 次\n- 累计: '+alerts.length+' 次哭声 / '+feeds.length+' 次喂养'+envStr+'\n\n请综合分析哭声规律、喂养间隔、温湿度对宝宝舒适度的影响、综合护理建议。限300字。';
  fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:500,temperature:0.7})
  }).then(function(r){return r.json()}).then(function(d){
    document.getElementById('aiResult').textContent=d.choices?d.choices[0].message.content:'失败: '+JSON.stringify(d);
    btn.textContent='开始分析';btn.disabled=false;
  }).catch(function(e){document.getElementById('aiResult').textContent='网络错误: '+e.message;btn.textContent='开始分析';btn.disabled=false;});
}

// ═══════════════ Tab 切换 ═══════════════
function switchTab(name){
  var btns=document.querySelectorAll('.tab-bar button'),panes=document.querySelectorAll('.tab-pane');
  btns.forEach(function(b){b.classList.remove('active');});
  panes.forEach(function(p){p.classList.remove('active');});
  event.target.closest('button').classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
  if(name==='alerts')loadAlerts();if(name==='feeding')loadFeedings();if(name==='stats')loadStats();
}

// ═══════════════ UI ═══════════════
function updateUI(){
  var btn=document.getElementById('btnToggle');
  if(started){btn.textContent='停止监视';btn.style.background='#147d72';}
  else{btn.textContent='开启监视';btn.style.background='#3267c8';}
}
function refresh(){updateUI();loadStats();renderMonitorList();}
function esc(s){var d=document.createElement('div');d.textContent=(s||'');return d.innerHTML;}

var envHistory={}; // per-device ring buffer: {deviceId -> [{t,h,ts},...]}
var lastEnvSampleKey={};

// ═══════════════ 远程控制 ═══════════════
function sendCmd(cmd){
  if(!deviceId){showError('请先绑定设备');return false;}
  if(typeof Android==='undefined'){showError('控制桥接不可用');return false;}
  var ok=Android.mqttPublish('aihear/cmd','{"cmd":"'+cmd+'","device":"'+deviceId+'"}');
  if(!ok)showError('MQTT 未连接，命令发送失败');
  return ok;
}
function sendCmdAll(cmd){
  if(typeof Android==='undefined'){showError('控制桥接不可用');return false;}
  if(!devices||!devices.length){showError('没有已绑定设备');return false;}
  var allOk=true;
  devices.forEach(function(id){
    var ok=Android.mqttPublish('aihear/cmd','{"cmd":"'+cmd+'","device":"'+id+'"}');
    if(!ok)allOk=false;
  });
  if(!allOk)showError('部分设备命令发送失败');
  return allOk;
}

var controlStates={};
function currentControlState(){return controlStates[deviceId]||null;}

function toggleArm(){
  if(monitorAll){showError('请先切换到单个设备再执行布防/撤防');return;}
  var s=currentControlState();
  if(!s){showError('正在等待设备状态');return;}
  if(sendCmd(s.armed?'disarm':'arm')){
    var b=document.getElementById('btnArm');b.disabled=true;b.textContent='执行中';
    setTimeout(function(){if(b.disabled)updateArmBtn();},3000);
  }
}
function updateArmBtn(){
  var b=document.getElementById('btnArm'),s=currentControlState();
  if(monitorAll){b.textContent='切换设备后可用';b.style.background='#f1f3f2';b.style.borderColor='#dfe5e2';b.style.color='#6f7c79';b.disabled=true;return;}
  if(!s){b.textContent='状态同步中';b.style.background='#f1f3f2';b.style.borderColor='#dfe5e2';b.style.color='#6f7c79';b.disabled=true;return;}
  b.disabled=false;
  if(s.armed){b.textContent='撤防';b.style.background='#fceaea';b.style.borderColor='#efc5c5';b.style.color='#b54141';}
  else{b.textContent='布防';b.style.background='#e5f3f0';b.style.borderColor='#b8ddd5';b.style.color='#116b62';}
}

function toggleMusic(){
  if(monitorAll){showError('请先切换到单个设备再操作音乐');return;}
  var s=currentControlState();
  if(!s){showError('正在等待设备状态');return;}
  if(sendCmd(s.music?'stop_music':'play_music')){
    var b=document.getElementById('btnMusic');b.disabled=true;b.textContent='执行中';
    setTimeout(function(){if(b.disabled)updateMusicBtn();},3000);
  }
}
function updateMusicBtn(){
  var b=document.getElementById('btnMusic'),s=currentControlState();
  if(monitorAll){b.textContent='切换设备后可用';b.style.background='#f1f3f2';b.style.borderColor='#dfe5e2';b.style.color='#6f7c79';b.disabled=true;return;}
  if(!s){b.textContent='状态同步中';b.style.background='#f1f3f2';b.style.borderColor='#dfe5e2';b.style.color='#6f7c79';b.disabled=true;return;}
  b.disabled=false;
  if(s.music){b.textContent='播放中';b.style.background='#e5f3f0';b.style.borderColor='#b8ddd5';b.style.color='#116b62';}
  else{b.textContent='播放音乐';b.style.background='#eaf0fb';b.style.borderColor='#c7d5f1';b.style.color='#2859ad';}
}

function pollControlState(){
  if(typeof Android==='undefined'||!deviceId)return;
  var d={};
  try{d=JSON.parse(Android.getControlState(deviceId)||'{}');}catch(e){return;}
  if(typeof d.armed!=='boolean'||typeof d.music!=='boolean')return;
  var id=normalizeDeviceId(d.deviceId||deviceId);
  if(id!==deviceId)return;
  controlStates[id]={armed:d.armed,music:d.music,uptimeMs:d.uptimeMs||0};
  localStorage.setItem('arm_state_'+id,d.armed?'1':'0');
  updateArmBtn();updateMusicBtn();
}

var monitorAll=false;
function toggleMonitorAll(){
  monitorAll=!monitorAll;
  updateMonitorAllBtn();
  updateArmBtn(); updateMusicBtn();  /* arm/music disabled in monitorAll mode */
  loadAlerts();   /* refresh alert list with new scope */
  loadStats();    /* refresh stats (all devices vs selected) */
}
function selectDeviceSilent(id){var prev=deviceId;deviceId=id;localStorage.setItem('selected_device',id);}
function updateMonitorAllBtn(){
  var b=document.getElementById('btnMonitorAll');
  if(monitorAll){b.textContent='全部停止';b.style.background='#fceaea';b.style.borderColor='#efc5c5';b.style.color='#b54141';}
  else{b.textContent='全部监视';b.style.background='#f1f3f2';b.style.borderColor='#dfe5e2';b.style.color='#4d5a57';}
}

function pollEnv(){
  if(typeof Android==='undefined'||!deviceId)return;
  try{var d=JSON.parse(Android.getEnvData(deviceId)||'{}');}
  catch(e){var d={};}
  if(d.temp!=null&&d.humi!=null){
    document.getElementById('envDisplay').textContent=d.temp.toFixed(1)+'°C · '+Math.round(d.humi)+'% RH';
    var sampleKey=(d.deviceId||deviceId)+'|'+(d.uptimeMs==null?JSON.stringify(d):d.uptimeMs);
    if(sampleKey===(lastEnvSampleKey[deviceId]||''))return;
    lastEnvSampleKey[deviceId]=sampleKey;
    // per-device ring buffer (keep last 24h @ 5s = 17280 samples)
    var buf=envHistory[deviceId]||[];
    var now=Date.now();buf.push({t:d.temp,h:d.humi,ts:now});
    var cutoff=now-86400000;
    while(buf.length&&buf[0].ts<cutoff)buf.shift();
    if(buf.length>20000)buf.splice(0,buf.length-17280);
    envHistory[deviceId]=buf;
  }
}
function getEnvAvg(){
  var buf=envHistory[deviceId||'']||[];
  if(!buf.length)return null;
  var st=0,sh=0,n=buf.length;
  for(var i=0;i<n;i++){st+=buf[i].t;sh+=buf[i].h;}
  return {temp:(st/n),humi:(sh/n)};
}

// ═══════════════ 轮询 ═══════════════
setInterval(function(){pollMqtt();pollEnv();if(started)loadStats();
  if(document.getElementById('pane-alerts').classList.contains('active'))loadAlerts();
  updateArmBtn();updateMusicBtn();updateMonitorAllBtn();
},5000);
setInterval(pollControlState,1000);

// ═══════════════ 初始化 ═══════════════
(function init(){
  initBind();
  var sk=localStorage.getItem('ds_api_key')||document.getElementById('apiKey').value;
  document.getElementById('apiKey').value=sk;
  if(!localStorage.getItem('ds_api_key'))localStorage.setItem('ds_api_key',sk);
  updateUI();updateArmBtn();updateMusicBtn();pollMqtt();pollControlState();loadStats();renderMonitorList();
})();
</script>
